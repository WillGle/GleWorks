server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Basic security headers
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-Content-Type-Options "nosniff";

  # SPA routing - if URL not found, serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy (optional - will 502 if backend not available)
  location /api/ {
    # Use IP instead of hostname to avoid DNS resolution at startup
    proxy_pass http://host.docker.internal:3000/;
    proxy_set_header Host $host;
    
    # Return 503 if backend is down (instead of crashing nginx)
    proxy_intercept_errors on;
    error_page 502 503 504 = @api_error;
  }

  location @api_error {
    add_header Content-Type application/json;
    return 503 '{"error": "Backend service unavailable"}';
  }
  
  # Compression (makes site faster)
  gzip on;
  gzip_types text/css application/javascript application/json;
}
