version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend

  backend:
    image: node:20-alpine
    command: >
      sh -c "node -e \"require('http').createServer((req,res)=>{res.setHeader('Content-Type','application/json'); res.end(JSON.stringify({ok:true,path:req.url}));}).listen(3000)\""
    ports:
      - "3000:3000"
